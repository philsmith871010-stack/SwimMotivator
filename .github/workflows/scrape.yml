name: Scrape Swimming Data

on:
  # Run manually from GitHub Actions tab
  workflow_dispatch:
    inputs:
      mode:
        description: 'What to scrape'
        required: true
        default: 'weekly-update'
        type: choice
        options:
          - weekly-update   # Current year rankings + meets (fast, ~1-2 hours)
          - rankings-full   # All years national rankings (~3 hours)
          - meets-full      # All years meet results (~8 hours, resumable)
          - export          # Just re-export JSON from existing DB

  # Weekly schedule: every Monday at 2am UTC
  schedule:
    - cron: '0 2 * * 1'

permissions:
  contents: write

concurrency:
  group: scraper
  cancel-in-progress: false

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 360  # 6 hour max

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore database from cache
        uses: actions/cache/restore@v4
        with:
          path: data/swimmotivator.db
          key: swim-db-${{ github.run_id }}
          restore-keys: |
            swim-db-

      - name: Run scraper
        run: |
          MODE="${{ github.event.inputs.mode || 'weekly-update' }}"
          CURRENT_YEAR=$(date +%Y)
          LAST_YEAR=$((CURRENT_YEAR - 1))

          echo "Mode: $MODE"
          echo "Current year: $CURRENT_YEAR"

          case "$MODE" in
            weekly-update)
              echo "=== Weekly update: current year rankings + meets ==="

              # Rankings for current + last year only (resumable)
              python -c "
          from scraper.scrape_rankings import scrape_event_rankings
          scrape_event_rankings(years=[$LAST_YEAR, $CURRENT_YEAR], force=False)
          " || true

              # Derive swimmer ranks
              python -m scraper.scrape_swimmer_ranks || true

              # Meets for current + last year (resumable)
              python -c "
          from scraper.scrape_meets import scrape_year
          scrape_year($CURRENT_YEAR)
          scrape_year($LAST_YEAR)
          " || true

              # Export
              python -m scraper.export_json
              ;;

            rankings-full)
              echo "=== Full national rankings (all years) ==="
              python -m scraper.scrape_rankings
              python -m scraper.scrape_swimmer_ranks
              python -m scraper.export_json
              ;;

            meets-full)
              echo "=== Full meet results (all years, resumable) ==="
              for y in $(seq 2022 $CURRENT_YEAR); do
                echo "--- Year: $y ---"
                python -c "from scraper.scrape_meets import scrape_year; scrape_year($y)" || true
              done
              python -m scraper.export_json
              ;;

            export)
              echo "=== Re-exporting JSON ==="
              python -m scraper.export_json
              ;;
          esac

      - name: Show database status
        run: python bulk_load.py --status || true

      - name: Save database to cache
        uses: actions/cache/save@v4
        if: always()
        with:
          path: data/swimmotivator.db
          key: swim-db-${{ github.run_id }}

      - name: Commit and push updated JSON
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/json/
          if git diff --staged --quiet; then
            echo "No JSON changes to commit"
          else
            git commit -m "Update swimming data ($(date -u +%Y-%m-%d))"
            git push
          fi
