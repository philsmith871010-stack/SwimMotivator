<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SwimMotivator</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <div class="header">
    <div class="header-inner">
      <div>
        <h1><span class="accent">Swim</span>Motivator</h1>
        <div class="subtitle">City of St Albans SC</div>
      </div>
      <div class="swimmer-toggle">
        <button class="swimmer-btn bella active" data-swimmer="bella" id="btnBella">Bella</button>
        <button class="swimmer-btn amber" data-swimmer="amber" id="btnAmber">Amber</button>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="status-bar"><span id="statusText">Loading...</span></div>

    <!-- Row 1: Hero Stats -->
    <div class="stats-grid" id="heroStats">
      <div class="stat-card">
        <div class="stat-label">Best Event</div>
        <div class="stat-value cyan" id="statBestEvent">-</div>
        <div class="stat-detail" id="statBestRank">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Best WA Points</div>
        <div class="stat-value gold" id="statBestWA">-</div>
        <div class="stat-detail" id="statBestWAEvent">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Events Ranked</div>
        <div class="stat-value purple" id="statEventsRanked">-</div>
        <div class="stat-detail" id="statAvgRank">-</div>
      </div>
      <div class="stat-card">
        <div class="stat-label">Year Progress</div>
        <div class="stat-value green" id="statTrend">-</div>
        <div class="stat-detail" id="statTrendDetail">-</div>
      </div>
    </div>

    <!-- Row 2: Rankings + Chart -->
    <div class="two-col">
      <div class="col-left">
        <div class="card">
          <div class="card-title">My Rankings — England</div>
          <div class="rankings-list" id="rankingsList">
            <div class="loading"><div class="loading-spinner"></div></div>
          </div>
        </div>
      </div>
      <div class="col-right">
        <div class="card">
          <div class="card-title">
            <span id="chartTitle">My Progress</span>
            <select id="chartCourse" class="inline-select">
              <option value="">All Courses</option>
              <option value="S">Short Course</option>
              <option value="L">Long Course</option>
            </select>
          </div>
          <div class="chart-container"><canvas id="progressChart"></canvas></div>
        </div>
        <div class="card goals-card">
          <div class="card-title">Goals</div>
          <div id="goalsContainer">Select an event from My Rankings</div>
        </div>
      </div>
    </div>

    <!-- Row 3: Club Standings + Year on Year -->
    <div class="two-col">
      <div class="col-left">
        <div class="card">
          <div class="card-title">Club Standings — <span id="clubEventTitle">Select Event</span></div>
          <div class="squad-list" id="squadContainer">
            <div class="loading"><div class="loading-spinner"></div></div>
          </div>
        </div>
      </div>
      <div class="col-right">
        <div class="card">
          <div class="card-title">Rank Progression</div>
          <div class="chart-container chart-short"><canvas id="rankChart"></canvas></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <script src="js/utils.js?v=3"></script>
  <script src="js/charts.js?v=3"></script>
  <script src="js/app.js?v=3"></script>
</body>
</html>
